<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daniil Bormotov — Product Designer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon/32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon/16x16.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --radius: 14px;
      --gap: 16px;
    }

    body {
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      background: var(--bg);
      color: #BDBDBD;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      max-width: 1280px;
      margin: 0 auto;
      padding: 52px 40px 44px;
    }

    header h1 {
      font-size: clamp(26px, 3.5vw, 40px);
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1.1;
    }

    /* ── Gallery ── */
    .gallery {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 40px 80px;
      columns: 2;
      column-gap: var(--gap);
    }

    @media (max-width: 560px) {
      .gallery { columns: 1; padding: 0 16px 60px; }
      header   { padding: 36px 16px 32px; }
    }

    /* ── Card ── */
    .gallery-item {
      break-inside: avoid;
      margin-bottom: var(--gap);
      border-radius: var(--radius);
      overflow: hidden;
      position: relative;
      background: #e8e8e6;
      transition: transform 0.22s cubic-bezier(0.34, 1.4, 0.64, 1);
    }

    .gallery-item:hover { transform: translateY(-3px); }

    /* ── Square container ── */
    .media-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      overflow: hidden;
    }

    .media-wrap img,
    .media-wrap video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Video: first frame always visible as poster */
    .media-wrap video {
      opacity: 1;
    }

    /* ── Shimmer while loading ── */
    @keyframes shimmer {
      0%   { background-position: -200% 0; }
      100% { background-position:  200% 0; }
    }

    .gallery-item.loading .media-wrap {
      background: linear-gradient(90deg, #e8e8e6 25%, #d4d4d1 50%, #e8e8e6 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s ease-in-out infinite;
    }

    .gallery-item.loading .media-wrap video,
    .gallery-item.loading .media-wrap img {
      opacity: 0;
    }

    /* Fade in when ready */
    .media-wrap video,
    .media-wrap img {
      transition: opacity 0.4s ease;
    }

    @media (max-width: 560px) {
      .media-wrap { aspect-ratio: 1 / 1.3; }
    }
  </style>
</head>
<body>

<header>
  <h1>Daniil Bormotov<br>Product Designer T-Bank</h1>
</header>

<div class="gallery" id="gallery"></div>

<script src="works.js"></script>
<script>
  const gallery     = document.getElementById('gallery');
  const isTouch     = window.matchMedia('(hover: none)').matches;

  // ── Build cards ──────────────────────────────────────────
  WORKS.forEach(work => {
    const item = document.createElement('div');
    item.className   = 'gallery-item loading';
    item.dataset.type = work.type;

    if (work.type === 'video') {
      // data-src instead of src — actual load happens via IntersectionObserver
      item.innerHTML = `
        <div class="media-wrap">
          <video data-src="${work.src}" muted loop playsinline preload="metadata"></video>
        </div>`;
    } else {
      item.innerHTML = `
        <div class="media-wrap">
          <img data-src="${work.src}" alt="" />
        </div>`;
    }

    gallery.appendChild(item);
  });

  // ── Observer 1: ленивая загрузка (срабатывает за 200px до вьюпорта) ──
  const loadObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      const item  = entry.target;
      const video = item.querySelector('video');
      const img   = item.querySelector('img');

      if (video && video.dataset.src && !video.src) {
        video.src = video.dataset.src;
        video.load();
        video.addEventListener('loadeddata', () => {
          item.classList.remove('loading');
        }, { once: true });
      }
      if (img && img.dataset.src && !img.src) {
        img.src = img.dataset.src;
        img.addEventListener('load', () => {
          item.classList.remove('loading');
        }, { once: true });
      }

      loadObserver.unobserve(item);
    });
  }, { rootMargin: '200px', threshold: 0 });

  // ── Observer 2: мобильный автоплей (60% карточки в реальном вьюпорте) ──
  const playObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (!isTouch) return;
      const video = entry.target.querySelector('video');
      if (!video) return;

      if (entry.intersectionRatio >= 0.6) {
        video.play().catch(() => {});
      } else {
        video.pause();
      }
    });
  }, { rootMargin: '0px', threshold: [0, 0.6] });

  gallery.querySelectorAll('.gallery-item').forEach(item => {
    loadObserver.observe(item);
    playObserver.observe(item);
  });

  // ── Desktop hover play/pause ──────────────────────────────
  if (!isTouch) {
    gallery.querySelectorAll('.gallery-item[data-type="video"]').forEach(item => {
      const video = item.querySelector('video');
      if (!video) return;
      item.addEventListener('mouseenter', () => video.play().catch(() => {}));
      item.addEventListener('mouseleave', () => { video.pause(); video.currentTime = 0; });
    });
  }
</script>

</body>
</html>
